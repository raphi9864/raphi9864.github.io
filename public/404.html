<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <script>
      // Redirect SPA routes to index.html on GitHub Pages
      // Preserves the path as a query parameter for Angular to handle
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.host +
          l.pathname.split('/').slice(0, 2).join('/') +
          '/?p=/' +
          l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
