<section id="stack">
  <div appReveal>
    <div class="section-label">Outils &amp; technologies</div>
    <h2 class="section-title">Ma stack technique</h2>
    <p class="section-sub">
      Les technologies avec lesquelles je travaille au quotidien,
      côté client, serveur et infrastructure.
    </p>
  </div>

  <div class="stack-grid">
    @for (cat of categories; track cat.label; let i = $index) {
      <div class="stack-category" appReveal [revealDelay]="(i + 1) * 150">
        <div class="stack-cat-label">{{ cat.label }}</div>
        <div class="stack-items">
          @for (item of cat.items; track item.name) {
            <div class="stack-item">
              <div class="stack-icon">{{ item.icon }}</div>
              <div class="stack-info">
                <div class="stack-name">{{ item.name }}</div>
                <div class="stack-bar-bg">
                  <div class="stack-bar" [style.width.%]="item.level"></div>
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</section>
