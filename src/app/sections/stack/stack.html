<section id="stack">
  <div class="s-label">Stack</div>
  <h2 class="s-title" appReveal>Langages <em>&amp; outils</em></h2>

  <div class="skills-layout">

    <!-- GitHub API language bars -->
    <div appReveal>
      <div class="gh-panel-title">Langages &mdash; données GitHub live</div>
      <div class="gh-status">{{ ghStatus }}</div>
      <div class="lang-bars">
        @for (bar of langBars; track bar.lang) {
          <div class="lang-row">
            <div class="lang-header">
              <span class="lang-name">{{ bar.lang }}</span>
              <span class="lang-pct">{{ bar.pct }}%</span>
            </div>
            <div class="lang-track">
              <div class="lang-fill"
                [style.background]="bar.color"
                [attr.data-pct]="bar.pct">
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Skill chips -->
    <div appReveal [revealDelay]="150">
      @for (cat of categories; track cat.label) {
        <div class="skill-group">
          <div class="skill-group-title">{{ cat.label }}</div>
          <div class="skill-chips">
            @for (item of cat.items; track item.name) {
              <span class="chip">{{ item.name }}</span>
            }
          </div>
        </div>
      }
    </div>

  </div>
</section>
