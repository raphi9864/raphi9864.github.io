<section id="projets">
  <div appReveal>
    <div class="s-label">Réalisations</div>
    <h2 class="s-title">Ce que j'ai <em>construit</em></h2>
  </div>

  <div class="projects-grid">
    @for (project of projects(); track project.id; let i = $index) {
      <app-project-card [project]="project" [cardIndex]="i + 1" appReveal [revealDelay]="i * 80" />
    }
  </div>
</section>
